openapi: 3.0.3
info:
  title: WND Dialer API
  version: 2.0.0
  description: |
    Backward-compatible API contract supporting v1 and v2 via Accept header negotiation.
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  headers:
    XTenantId:
      description: Active tenant context ID for tenant-scoped operations.
      schema:
        type: string
        format: uuid
    XApiVersion:
      description: Resolved API version (`v1` or `v2`) from Accept negotiation.
      schema:
        type: string
        enum: [v1, v2]
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    AuthRegisterRequest:
      type: object
      required: [company_name, first_name, last_name, email, password, password_confirmation, timezone]
      properties:
        company_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        password_confirmation:
          type: string
          format: password
        timezone:
          type: string
    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        price_monthly_cents:
          type: integer
paths:
  /plans:
    get:
      summary: List subscription plans
      tags: [Billing]
      responses:
        '200':
          description: Plan list
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
        '406':
          description: Unsupported vendor media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/register:
    post:
      summary: Register tenant owner
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Registered
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
          content:
            application/json:
              schema:
                type: object
        '422':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login success
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/me:
    get:
      summary: Current user context
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current user and tenant context
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /calls:
    post:
      summary: Create outbound call
      tags: [Dialer]
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_number]
              properties:
                to_number:
                  type: string
                from_number:
                  type: string
                lead_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Call created
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
        '409':
          description: Invalid state or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List calls
      tags: [Dialer]
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Call list
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
  /campaigns/{id}/start:
    post:
      summary: Start campaign
      tags: [Campaigns]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Tenant-Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Campaign run started
          headers:
            X-API-Version:
              $ref: '#/components/headers/XApiVersion'
        '409':
          description: Invalid campaign transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
