server {
  listen 80;
  server_name _;

  location = /__nginx {
    add_header Content-Type text/plain;
    return 200 "nginx-ok uri=$request_uri";
  }

  location = /api/__nginx {
    add_header Content-Type text/plain;
    return 200 "api-location-ok uri=$request_uri";
  }

  location / {
    add_header X-Which-Location root always;
    proxy_pass http://127.0.0.1:3099;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /api {
    add_header X-Which-Location api always;
    proxy_pass http://${BACKEND_HOST}:8088;
    add_header X-Proxy-Upstream $upstream_addr always;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-URI $request_uri;
  }

  location ^~ /storage/ {
    add_header X-Which-Location storage always;
    proxy_pass http://${BACKEND_HOST}:8088;
    add_header X-Proxy-Upstream $upstream_addr always;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-URI $request_uri;
  }
}
